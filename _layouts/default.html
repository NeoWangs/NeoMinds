<!doctype html>
<html lang="{{ site.lang | default: 'en' }}">
<head>
{% include head.html %}
</head>
<body data-site-version="{{ site.time | date: '%s' }}" data-search-index="{{ '/search.json' | relative_url }}" data-explorer-index="{{ '/explorer.json' | relative_url }}" data-graph-index="{{ '/graph.json' | relative_url }}" data-current-slug="{{ page.slug | default: '' | escape }}" data-current-url="{{ page.url | relative_url | escape }}">
{% include header.html %}
<button class="reader-exit" type="button" data-reader-toggle aria-pressed="false" aria-label="退出阅读模式">
  <span aria-hidden="true">‹</span> 返回导航
</button>
<div class="quartz-shell">
  {% include sidebar-left.html %}
  <div class="content-column">
    {{ content }}
    {% include footer.html %}
  </div>
  {% include sidebar-right.html %}
</div>
{% include search.html %}
{% include graph-dialog.html %}
<script src="{{ '/assets/js/cytoscape.min.js' | relative_url }}?v={{ site.time | date: '%s' }}"></script>
<script src="{{ '/assets/js/site.js' | relative_url }}?v={{ site.time | date: '%s' }}"></script>
</body>
</html>
