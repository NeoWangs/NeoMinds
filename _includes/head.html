<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% if page.title %}{{ page.title }} - {% endif %}{{ site.title }}</title>
<meta name="description" content="{{ page.description | default: page.excerpt | default: site.description | strip_html | strip_newlines | escape }}">
<link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
{% if site.obsidian_jekyll.mathjax %}
<script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
{% endif %}
<script>
(function () {
  try {
    var saved = localStorage.getItem('oj-theme');
    var mode = saved || '{{ site.obsidian_jekyll.default_theme | default: "light" }}';
    document.documentElement.setAttribute('data-theme', mode);
  } catch (e) {}
})();
</script>
