<section class="search-dialog" data-search-dialog aria-hidden="true" role="dialog" aria-modal="true" aria-label="搜索笔记">
  <button class="search-dialog__backdrop" type="button" data-search-close tabindex="-1" aria-label="关闭搜索"></button>
  <div class="search-dialog__panel">
    <div class="search-dialog__input-row">
      <span class="search-dialog__symbol">⌕</span>
      <input type="search" data-search-input autocomplete="off" placeholder="搜索标题、标签或内容…" aria-label="搜索笔记">
      <button class="search-dialog__close" type="button" data-search-close>Esc</button>
    </div>
    <p class="search-dialog__hint">输入关键词，快速穿过这座花园。</p>
    <div class="search-dialog__results" data-search-results></div>
  </div>
</section>
