<header class="site-header">
  <a class="brand" href="{{ '/' | relative_url }}">
    <span class="brand__title">{{ site.title }}</span>
    <span class="brand__desc">{{ site.description }}</span>
  </a>
  <nav class="site-nav" aria-label="Primary navigation">
    <a href="{{ '/archive/' | relative_url }}">Archive</a>
    {% for category in site.obsidian_jekyll.categories %}
    <a href="{{ '/categories/' | append: category.name | append: '/' | relative_url }}">{{ category.title | default: category.name }}</a>
    {% endfor %}
  </nav>
  <button class="theme-toggle" type="button" data-theme-toggle>Theme</button>
</header>
