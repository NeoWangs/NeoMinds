<section class="graph-dialog" data-graph-dialog aria-hidden="true" role="dialog" aria-modal="true" aria-label="全局关系图谱">
  <button class="graph-dialog__backdrop" data-graph-close type="button" aria-label="关闭图谱"></button>
  <div class="graph-dialog__panel">
    <div class="graph-dialog__header">
      <div><span>NEOXMIND</span><h2>全局关系图谱</h2></div>
      <div class="graph-dialog__actions">
        <button type="button" data-graph-fit>适配视图</button>
        <button type="button" data-graph-close>Esc</button>
      </div>
    </div>
    <p class="graph-dialog__hint" data-global-graph-status>拖拽画布平移，滚轮缩放；点击节点打开笔记。</p>
    <div class="global-graph" data-global-graph aria-label="所有笔记关系图"></div>
  </div>
</section>
