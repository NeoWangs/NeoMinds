<aside class="sidebar sidebar--left" id="left-sidebar" data-left-sidebar>
  <div class="sidebar-heading">
    <a class="sidebar-brand" href="{{ '/' | relative_url }}" aria-label="{{ site.title }} 首页" data-home-link>
      <span class="sidebar-brand__mark"><img src="{{ '/assets/favicon.svg' | relative_url }}" alt=""></span>
      <span class="sidebar-brand__text"><strong>{{ site.author }}的</strong><small>数字花园</small></span>
    </a>
    <button class="sidebar-collapse-toggle" type="button" data-sidebar-toggle aria-controls="left-sidebar" aria-expanded="true" aria-label="收起左侧栏" title="收起左侧栏">
      <svg aria-hidden="true" viewBox="0 0 24 24"><path d="m14.5 18-6-6 6-6"></path></svg>
    </button>
  </div>

  <div class="sidebar-actions">
    <button class="sidebar-search" type="button" data-search-open aria-label="搜索" title="搜索">
      <svg aria-hidden="true" viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"></circle><path d="m20 20-4.2-4.2"></path></svg>
      <span>搜索</span><kbd>⌘K</kbd>
    </button>
    <button class="utility-button utility-button--theme" type="button" data-theme-toggle aria-label="切换明暗模式">
      <svg class="utility-button__moon" aria-hidden="true" viewBox="0 0 24 24"><path d="M20.5 14.5A8.5 8.5 0 0 1 9.5 3.5a8.5 8.5 0 1 0 11 11Z"></path></svg>
      <svg class="utility-button__sun" aria-hidden="true" viewBox="0 0 24 24"><circle cx="12" cy="12" r="4.2"></circle><path d="M12 2.5v2.4M12 19.1v2.4M2.5 12h2.4M19.1 12h2.4M4.9 4.9l1.7 1.7M17.4 17.4l1.7 1.7M4.9 19.1l1.7-1.7M17.4 6.6l1.7-1.7"></path></svg>
      <span data-theme-label>深夜</span>
    </button>
  </div>

  <section class="explorer" data-explorer>
    <div class="explorer__tree" data-explorer-tree aria-live="polite"></div>
    <script>
    (function () {
      try {
        var target = document.currentScript.previousElementSibling;
        var version = document.body.getAttribute("data-site-version") || "dev";
        var markup = sessionStorage.getItem("oj-explorer-markup:" + version);
        if (!target || !markup) return;
        target.innerHTML = markup;

        target.querySelectorAll(".explorer-file.is-current").forEach(function (link) {
          link.classList.remove("is-current");
          link.removeAttribute("aria-current");
        });
        target.querySelectorAll(".explorer-folder").forEach(function (button) {
          button.classList.add("is-collapsed");
          button.setAttribute("aria-expanded", "false");
        });

        var current = Array.prototype.find.call(target.querySelectorAll("a.explorer-file"), function (link) {
          return link.pathname === window.location.pathname;
        });
        if (!current) return;
        current.classList.add("is-current");
        current.setAttribute("aria-current", "page");

        var list = current.parentElement && current.parentElement.parentElement;
        while (list && list !== target) {
          var folder = list.previousElementSibling;
          if (folder && folder.classList.contains("explorer-folder")) {
            folder.classList.remove("is-collapsed");
            folder.setAttribute("aria-expanded", "true");
          }
          list = list.parentElement && list.parentElement.parentElement;
        }
      } catch (error) {}
    })();
    </script>
  </section>

  <nav class="sidebar-external-links" aria-label="站外链接">
    <a href="https://blog.neoxmind.com/" target="_blank" rel="noopener noreferrer">
      <span>开过头先生的 Blog</span>

    </a>
    <a href="https://books.neoxmind.com/" target="_blank" rel="noopener noreferrer">
      <span>藏书阁</span>
      <svg aria-hidden="true" viewBox="0 0 24 24"><path d="M14 5h5v5M19 5l-8 8"></path><path d="M19 13v5a1 1 0 0 1-1 1H6a1 1 0 0 1-1-1V6a1 1 0 0 1 1-1h5"></path></svg>
    </a>
  </nav>

  <p class="sidebar-signature">由 Markdown 和<br>持续好奇驱动</p>
</aside>
